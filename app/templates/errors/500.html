{% extends "base.html" %}
{% block title %}Something Went Wrong | CoachPrash{% endblock %}

{% block content %}
<div class="container" style="text-align: center; padding: 4rem 1rem;">
    <h1 style="font-size: 5rem; color: var(--secondary); margin-bottom: 0.5rem;">500</h1>
    <h2 style="margin-bottom: 1rem;">Something Went Wrong</h2>
    <p style="color: var(--text-light); margin-bottom: 2rem; max-width: 500px; margin-left: auto; margin-right: auto;">
        We're experiencing a hiccup. Please try refreshing the page. If the problem persists, let us know.
    </p>
    <div style="display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;">
        <a href="{{ url_for('main.home') }}" class="btn btn-primary">Go Home</a>
        <a href="{{ url_for('main.contact') }}" class="btn btn-outline">Report Issue</a>
    </div>
</div>
{% endblock %}
